name: Deploy to Dokploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dokploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  deploy:
    name: Trigger Dokploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      DOKPLOY_ENDPOINT: https://console.onestack.run/api/trpc/compose.deploy
      DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Check deployment configuration
        id: config
        run: |
          configured=true
          for name in DOKPLOY_COMPOSE_ID DOKPLOY_API_KEY CF_ACCESS_CLIENT_ID CF_ACCESS_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::warning title=Missing secret::$name is not set; skipping Dokploy deployment."
              configured=false
            fi
          done
          echo "configured=$configured" >> "$GITHUB_OUTPUT"

      - name: Trigger deployment
        if: steps.config.outputs.configured == 'true'
        run: |
          node <<'NODE'
          const required = [
            'DOKPLOY_COMPOSE_ID',
            'DOKPLOY_API_KEY',
            'CF_ACCESS_CLIENT_ID',
            'CF_ACCESS_CLIENT_SECRET'
          ];

          const missing = required.filter((name) => !process.env[name]);
          if (missing.length > 0) {
            throw new Error(`Missing required secret(s): ${missing.join(', ')}`);
          }

          const headers = {
            'content-type': 'application/json',
            'CF-Access-Client-Id': process.env.CF_ACCESS_CLIENT_ID,
            'CF-Access-Client-Secret': process.env.CF_ACCESS_CLIENT_SECRET
          };

          if (process.env.DOKPLOY_API_KEY) {
            headers['x-api-key'] = process.env.DOKPLOY_API_KEY;
          }

          const shortSha = process.env.GITHUB_SHA.slice(0, 7);
          const payload = {
            json: {
              composeId: process.env.DOKPLOY_COMPOSE_ID,
              title: `GitHub push ${shortSha}`,
              description: `${process.env.GITHUB_REPOSITORY}@${process.env.GITHUB_SHA}`
            }
          };

          const response = await fetch(process.env.DOKPLOY_ENDPOINT, {
            method: 'POST',
            headers,
            body: JSON.stringify(payload)
          });

          const text = await response.text();
          let body = text;
          try {
            body = text ? JSON.parse(text) : null;
          } catch {
            // Keep the raw body for diagnostics below.
          }

          if (!response.ok) {
            let message = body?.error?.json?.message || body?.message || text || response.statusText;
            if (response.status === 401 && !process.env.DOKPLOY_API_KEY) {
              message += ' Add DOKPLOY_API_KEY as a repository secret if the Dokploy console requires API-key authentication after Cloudflare Access.';
            }
            throw new Error(`Dokploy deploy failed (${response.status}): ${message}`);
          }

          console.log('Dokploy deployment queued.');
          if (body) {
            console.log(JSON.stringify(body, null, 2));
          }
          NODE
